name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  JAVA_VERSION: '25'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MODRINTH_PROJECT: XcnNwheM                      # jsmacros-reloaded (mpp needs the ID, not the slug)
      MODRINTH_RUBY_PROJECT: EQoulhLS                 # jsmacros-ruby (mpp needs the ID, not the slug)
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}   # job-level so the skip-guard below works
    steps:
      - uses: actions/checkout@v4          # lands on the tag's commit — builds exactly what was tagged

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-overwrite-existing: true

      - name: Resolve channel + version from tag
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"                 # full version, used verbatim
          case "$VER" in
            *-alpha*) CHANNEL=alpha ;;   # alpha type on Modrinth
            *-*)      CHANNEL=beta ;;    # any other pre-release suffix -> beta
            *)        CHANNEL=release ;; # stable
          esac
          ARGS="-Pchannel=$CHANNEL -Pmod_version=$VER"
          MODVER=$(./gradlew -q printVersion $ARGS | tail -1 | tr -d '\n\r')
          {
            echo "tag=$TAG"
            echo "args=$ARGS"
            echo "mod_version=$MODVER"
          } >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: ./gradlew createDist ${{ steps.ver.outputs.args }}

      - name: Upload jars to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          V="${{ steps.ver.outputs.mod_version }}"
          shopt -s nullglob
          FILES=(
            dist/jsmacrosce-*-fabric-"$V".jar
            dist/jsmacrosce-ruby-*-"$V".jar
            dist/jsmacrosce-devkit-*-"$V".zip
            dist/jsmacrosce-extensions-*-"$V".zip
            dist/extensions/jsmacrosce-ext-*-"$V".jar
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No dist artifacts matched version $V"; exit 1
          fi
          gh release upload "${{ steps.ver.outputs.tag }}" "${FILES[@]}" --clobber

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != ''
        run: ./gradlew publishMods ${{ steps.ver.outputs.args }}

      # mod-publish-plugin can't set the per-version environment, so patch it after upload.
      - name: Mark Modrinth versions as client-side
        if: env.MODRINTH_TOKEN != ''
        shell: bash
        env:
          V: ${{ steps.ver.outputs.mod_version }}
        run: |
          set -euo pipefail
          for PID in "$MODRINTH_PROJECT" "$MODRINTH_RUBY_PROJECT"; do
            [ -z "$PID" ] && continue
            VID=$(curl -fsS -H "Authorization: $MODRINTH_TOKEN" \
                  "https://api.modrinth.com/v3/project/$PID/version" \
              | python3 -c "import sys,json,os; vs=json.load(sys.stdin); pfx=os.environ['V']+'+'; print(next((v['id'] for v in vs if v['version_number'].startswith(pfx)), ''))")
            if [ -z "$VID" ]; then
              echo "::warning::No Modrinth version matching $V for project $PID"; continue
            fi
            curl -fsS -X PATCH \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"environment":"client_only"}' \
              "https://api.modrinth.com/v3/version/$VID"
            echo "Set $PID version $VID ($V) to client_only"
          done
